name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check ingestion/ ab_engine/ ml/ dashboard/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=ingestion \
            --cov=ab_engine \
            --cov=ml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: dbt test
        run: |
          cd dbt_project
          dbt deps
          dbt run --target ci
          dbt test --target ci